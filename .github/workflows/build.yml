name: Build and publish mumble-server

on:
  push:
    tags:
      - "*"

jobs:
  build:
    name: Build and publish mumble-server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Build mumble-server
        run: ./build.sh

      - name: Publish mumble-server
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mumble-server.tar.gz
